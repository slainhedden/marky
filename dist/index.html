<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marky</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="toolbar">
        <div class="toolbar__group">
          <button id="toolbar-open-file-button" type="button">Open File</button>
          <button id="toolbar-open-folder-button" type="button">Open Folder</button>
        </div>

        <div class="toolbar__group toolbar__group--right">
          <button id="toggle-view-button" class="toggle-view-button" type="button" hidden>
            Show Source
          </button>
        </div>
      </header>

      <main class="workspace">
        <section id="empty-state" class="empty-state">
          <p class="empty-state__eyebrow">Marky</p>
          <h1>Open markdown in peace.</h1>
          <div class="empty-state__actions">
            <button id="empty-open-file-button" type="button">Open File</button>
            <button id="empty-open-folder-button" type="button">Open Folder</button>
          </div>
        </section>

        <section id="document-shell" class="document-shell" hidden>
          <aside id="sidebar" class="sidebar" hidden>
            <div id="file-tree" class="file-tree"></div>
          </aside>

          <section class="content-pane">
            <article id="rendered-view" class="viewer markdown-view" hidden></article>
            <pre id="source-view" class="viewer source-view" hidden></pre>
          </section>
        </section>
      </main>

      <aside id="error-banner" class="error-banner" hidden></aside>
    </div>

    <script type="module" src="./viewer.js"></script>
  </body>
</html>
