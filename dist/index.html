<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marky</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="toolbar">
        <button id="toolbar-open-file-button" type="button">Open File</button>
        <button id="toggle-view-button" class="toggle-view-button" type="button" hidden>
          Show Source
        </button>
      </header>

      <main class="workspace">
        <section id="empty-state" class="empty-state">
          <p class="empty-state__eyebrow">Marky</p>
          <h1>Open markdown in peace.</h1>
          <button id="empty-open-file-button" type="button">Open File</button>
        </section>

        <section id="document-shell" class="document-shell" hidden>
          <article id="rendered-view" class="viewer markdown-view" hidden></article>
          <pre id="source-view" class="viewer source-view" hidden></pre>
        </section>
      </main>

      <aside id="error-banner" class="error-banner" hidden></aside>
    </div>

    <script type="module" src="./viewer.js"></script>
  </body>
</html>
