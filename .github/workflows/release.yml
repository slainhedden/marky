name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            build_command: npm run build:windows
            artifact_name: marky-windows-x64
            asset_glob: src-tauri/target/release/bundle/nsis/*.exe
          - name: macos-x64
            os: macos-15-intel
            rust_target: x86_64-apple-darwin
            build_command: npm run build:mac -- --target x86_64-apple-darwin
            artifact_name: marky-macos-x64
            asset_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - name: macos-aarch64
            os: macos-15
            rust_target: aarch64-apple-darwin
            build_command: npm run build:mac -- --target aarch64-apple-darwin
            artifact_name: marky-macos-aarch64
            asset_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install dependencies
        run: npm ci

      - name: Build release bundle
        run: ${{ matrix.build_command }}

      - name: Upload release assets
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_glob }}
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download built assets
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
